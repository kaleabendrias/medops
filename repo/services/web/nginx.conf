server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /health {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  # Reverse-proxy API requests so the frontend can use same-origin
  # relative paths (/api/v1/...) instead of hardcoded localhost:8000.
  # This allows any intranet client to reach the API through the web
  # server's address without CORS or host-binding issues.
  location /api/ {
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    client_max_body_size 30m;
  }

  location / {
    try_files $uri /index.html;
  }
}
