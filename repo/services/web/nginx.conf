server {
  listen 8080;
  server_name _;

  # /health is served over plain HTTP so Docker healthchecks succeed
  # without requiring TLS certificate trust.  Everything else is
  # permanently redirected to the HTTPS listener.
  location = /health {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location / {
    return 301 https://$host:8443$request_uri;
  }
}

server {
  listen 8443 ssl;
  server_name _;

  ssl_certificate     /etc/nginx/ssl/server.crt;
  ssl_certificate_key /etc/nginx/ssl/server.key;

  # Modern TLS settings: TLS 1.2+ only, strong ciphers.
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

  root /usr/share/nginx/html;
  index index.html;

  location = /health {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  # Reverse-proxy API requests so the frontend can use same-origin
  # relative paths (/api/v1/...) instead of hardcoded localhost:8000.
  location /api/ {
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    client_max_body_size 30m;
  }

  location / {
    try_files $uri /index.html;
  }
}
