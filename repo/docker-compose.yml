# ──────────────────────────────────────────────────────────────────
# NON-PRODUCTION DEFAULTS: The credentials below are for local
# development and offline testing only. Override them via environment
# variables or a docker-compose.override.yml before deploying to any
# internet-facing or shared environment.
# ──────────────────────────────────────────────────────────────────

services:
  mysql:
    image: mysql:8.4
    container_name: monorepo_mysql
    restart: unless-stopped
    command: --log-bin-trust-function-creators=1 --event-scheduler=ON
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password_local}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hospital_platform}
      MYSQL_USER: ${MYSQL_USER:-app_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app_password_local}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD:-root_password_local} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: monorepo_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - api_state:/var/lib/rocket-api
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: services/web/Dockerfile
    container_name: monorepo_web
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  test_runner:
    image: rust:bookworm
    working_dir: /workspace
    environment:
      PATH: /usr/local/cargo/bin:/usr/local/rustup/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      CARGO_HTTP_TIMEOUT: "120"
      CARGO_NET_RETRY: "10"
    volumes:
      - .:/workspace

volumes:
  mysql_data:
    name: monorepo_mysql_data
  api_state:
    name: monorepo_api_state
